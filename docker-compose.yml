version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: talentcircle-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-talentcircle}
      POSTGRES_USER: ${DB_USER:-talentcircle}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-talentcircle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-talentcircle} -d ${DB_NAME:-talentcircle}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentcircle-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: talentcircle-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentcircle-network
    restart: always

  backend:
    image: ${DOCKER_HUB_USER}/talentcircle-backend:latest # Usaremos imagen de tu Docker Hub
    container_name: talentcircle-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-talentcircle}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-talentcircle}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-talentcircle}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
      - LINKEDIN_PERSON_ID=${LINKEDIN_PERSON_ID}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentcircle-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  talentcircle-network:
    driver: bridge