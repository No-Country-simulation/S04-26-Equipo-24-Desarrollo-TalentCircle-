version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentcircle-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - talentcircle-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: talentcircle-postgres
    environment:
      POSTGRES_DB: talentcircle
      POSTGRES_USER: talentcircle
      POSTGRES_PASSWORD: talentcircle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentcircle"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentcircle-network

  redis:
    image: redis:7-alpine
    container_name: talentcircle-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentcircle-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentcircle-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DATABASE_URL=jdbc:postgresql://postgres:5432/talentcircle
      - DATABASE_USER=talentcircle
      - DATABASE_PASSWORD=talentcircle
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
      - LINKEDIN_PERSON_ID=${LINKEDIN_PERSON_ID}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentcircle-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  talentcircle-network:
    driver: bridge
