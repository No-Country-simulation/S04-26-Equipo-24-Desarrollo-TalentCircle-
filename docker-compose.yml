version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: talentcircle-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentcircle-network
    restart: always

  backend:
    image: chuycode/talentcircle-backend:v0.3.0
    container_name: talentcircle-backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:talentcircle_db;DB_CLOSE_DELAY=-1
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS=true
      # 👇 Aquí mapeamos las variables protegidas usando ${} 👇
      - JWT_SECRET=${JWT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - talentcircle-network
    restart: unless-stopped

  frontend:
    image: chuycode/talentcircle-frontend:v0.3.0
    container_name: talentcircle-frontend
    depends_on:
      - backend
    networks:
      - talentcircle-network
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: talentcircle-gateway
    ports:
      - "1024:80"
    volumes:
      - /home/ubuntu/talentcircle/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - talentcircle-network
    restart: always

volumes:
  redis_data:

networks:
  talentcircle-network:
    driver: bridge