server {
    listen 80;

    # Consola H2
    location /h2-console {
        proxy_pass http://talentcircle-backend:8080/h2-console;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend - Ajustamos para asegurar que llegue al contenedor
    location /api {
        proxy_pass http://talentcircle-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Esto ayuda con errores de CORS si el backend es estricto
        proxy_hide_header 'Access-Control-Allow-Origin';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Frontend
    location / {
        proxy_pass http://talentcircle-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}