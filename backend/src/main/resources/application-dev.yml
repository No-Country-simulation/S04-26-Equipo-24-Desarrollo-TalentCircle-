server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:talentcircle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: none          # Flyway manages the schema
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/h2
    baseline-on-migrate: true
    validate-on-migrate: false
    table: flyway_schema_history

  # Disable Redis in dev — use no-op cache
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  cache:
    type: simple   # In-memory cache for dev (no Redis needed)

  batch:
    job:
      enabled: false

app:
  jwt:
    secret: dev-secret-key-minimum-32-characters-long
    access-token-expiration: 28800000   # 8 hours
    refresh-token-expiration: 604800000 # 7 days

  cors:
    allowed-origins: http://localhost:3000

  pipeline:
    schedule-cron: "0 0 18 * * FRI"

  llm:
    provider: openai
    openai:
      api-key: ${OPENAI_API_KEY:dev-placeholder}
      model: gpt-4-turbo
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:dev-placeholder}
      model: claude-3-sonnet-20240229

  linkedin:
    access-token: ${LINKEDIN_ACCESS_TOKEN:dev-placeholder}
    person-id: ${LINKEDIN_PERSON_ID:dev-placeholder}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.talentcircle: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
