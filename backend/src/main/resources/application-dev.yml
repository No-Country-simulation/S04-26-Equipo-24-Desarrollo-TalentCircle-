server:
  port: 0

spring:


  datasource:
    url: jdbc:postgresql://localhost:5432/talentcircle
    username: talentcircle
    password: talentcircle
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false


  data:
    redis:
      host: localhost
      port: 6379


  batch:
    job:
      enabled: false


app:
  jwt:
    secret: my-32-character-secret-key-here-32-char
    access-token-expiration: 28800000  # 8 hours
    refresh-token-expiration: 604800000  # 7 days


  cors:
    allowed-origins: http://localhost:3000


logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.talentcircle: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
