server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:talentcircle_db;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
        format_sql: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  h2:
    console:
      enabled: true
      settings:
        web-allow-others: ${SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS:true}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:my-32-character-secret-key-here-32-char}
    access-token-expiration: 28800000
    refresh-token-expiration: 604800000

  cors:
    # Permite peticiones desde nginx (mismo origen) y desde localhost en dev
    allowed-origins: ${FRONTEND_URL:http://localhost:1024,http://localhost:5173}

  discord:
    bot-token: ${DISCORD_BOT_TOKEN:}
    guild-id: ${DISCORD_GUILD_ID:}

logging:
  level:
    com.talentcircle: INFO
    org.springframework: WARN
    org.hibernate: WARN
