spring:
  profiles:
    active: dev

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/talentcircle}
    username: ${DATABASE_USER:talentcircle}
    password: ${DATABASE_PASSWORD:talentcircle}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  batch:
    job:
      enabled: false
    initialize-schema: never

  threads:
    virtual:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:my-32-character-secret-key-here-32-char}
    access-token-expiration: 28800000  # 8 horas en ms
    refresh-token-expiration: 604800000 # 7 días en ms
  
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.talentcircle: DEBUG
    org.springframework: WARN
    org.hibernate: WARN
