spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration

  datasource:
    url: jdbc:h2:mem:talentcircle_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration/h2
    table: flyway_schema_history
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  batch:
    job:
      enabled: false
    initialize-schema: never

  threads:
    virtual:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:my-32-character-secret-key-here-32-char}
    access-token-expiration: 28800000  # 8 horas en ms
    refresh-token-expiration: 604800000 # 7 días en ms
  
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

  discord:
    bot-token: ${DISCORD_BOT_TOKEN:}
    guild-id: ${DISCORD_GUILD_ID:}

  linkedin:
    access-token: ${LINKEDIN_ACCESS_TOKEN:}
    person-id: ${LINKEDIN_PERSON_ID:}
    base-url: https://api.linkedin.com

  llm:
    provider: ${LLM_PROVIDER:openrouter}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.talentcircle: DEBUG
    org.springframework: WARN
    org.hibernate: WARN