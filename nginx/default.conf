server {
    listen 80;

    # ── Consola H2 ────────────────────────────────────────────────────────────
    location /h2-console {
        proxy_pass         http://talentcircle-backend:8080/h2-console;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Backend ───────────────────────────────────────────────────────────
    # IMPORTANTE: proxy_pass con la URL completa + sin trailing slash en location
    # hace que nginx pase la ruta completa al backend tal cual.
    # /api/v1/auth/login → http://talentcircle-backend:8080/api/v1/auth/login
    location /api {
        proxy_pass         http://talentcircle-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # CORS — el backend ya lo maneja, pero lo dejamos como fallback
        proxy_hide_header  'Access-Control-Allow-Origin';
        add_header         'Access-Control-Allow-Origin' '*' always;

        # Preflight OPTIONS — responder directamente sin ir al backend
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'               0;
            return 204;
        }
    }

    # ── Discord endpoint ──────────────────────────────────────────────────────
    location /discord {
        proxy_pass         http://talentcircle-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://talentcircle-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    # Va al final — captura todo lo que no sea /api, /discord, /ws
    location / {
        proxy_pass       http://talentcircle-frontend:80;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
